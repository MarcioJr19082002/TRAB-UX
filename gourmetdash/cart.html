<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GourmetDash | Carrinho</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: "#1565c0",
              deep: "#0d4a94",
              bright: "#2b8aef",
              soft: "#e8f3fc",
            },
            ink: {
              DEFAULT: "#151a22",
              muted: "#4a5568",
              faint: "#7a8699",
            },
            paper: {
              DEFAULT: "#f4f7fb",
              card: "#ffffff",
              line: "#dce4ef",
            },
          },
          fontFamily: {
            display: ["Outfit", "sans-serif"],
            sans: ["Manrope", "sans-serif"],
          },
          boxShadow: {
            soft: "0 8px 28px rgba(21, 26, 34, 0.06)",
            lift: "0 14px 40px rgba(21, 101, 192, 0.22)",
          },
        },
      },
    };
  </script>
  <style>
    :root {
      --brand: #1565c0;
      --paper: #f4f7fb;
    }

    body {
      font-family: Manrope, sans-serif;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, #cfe3fb 0%, transparent 55%),
        linear-gradient(180deg, #f7fafc 0%, #e8eef6 100%);
      min-height: 100dvh;
      color: #151a22;
    }

    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      user-select: none;
    }

    .brand-wash {
      background:
        radial-gradient(circle at 85% 20%, rgba(255, 255, 255, 0.22), transparent 45%),
        linear-gradient(135deg, #0d4a94 0%, #1565c0 48%, #2b8aef 100%);
    }

    .phone-shell {
      width: min(100%, 420px);
      margin-inline: auto;
      min-height: 100dvh;
      background: var(--paper);
      position: relative;
      overflow-x: hidden;
    }

    @media (min-width: 480px) {
      body {
        display: grid;
        place-items: center;
        padding: 2rem 1rem;
      }

      .phone-shell {
        min-height: 844px;
        max-height: 900px;
        border-radius: 2rem;
        box-shadow:
          0 0 0 1px rgba(21, 26, 34, 0.06),
          0 24px 80px rgba(21, 26, 34, 0.14);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .phone-shell main {
        overflow-y: auto;
        flex: 1;
      }
    }

    .coupon-panel {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.25s ease, margin 0.25s ease;
      margin-top: 0;
    }

    .coupon-panel.is-open {
      max-height: 80px;
      opacity: 1;
      margin-top: 0.5rem;
    }

    .reveal {
      animation: rise 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    textarea:focus, input:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(21, 101, 192, 0.25);
      border-color: #1565c0;
    }
  </style>
</head>
<body>
  <div class="phone-shell">
    <header class="sticky top-0 z-50 flex justify-between items-center px-5 h-16 bg-paper/85 backdrop-blur-md border-b border-paper-line/60">
      <div class="flex items-center gap-1">
        <a href="restaurant.html" class="w-10 h-10 grid place-items-center rounded-full hover:bg-white active:scale-90 transition" aria-label="Voltar">
          <span class="material-symbols-outlined text-brand" aria-hidden="true">arrow_back</span>
        </a>
        <h1 class="font-display text-lg font-bold">Seu carrinho</h1>
      </div>
      <div class="flex items-center gap-1 text-brand">
        <span class="material-symbols-outlined !text-[18px]" aria-hidden="true">location_on</span>
        <span class="text-xs font-bold">Casa</span>
      </div>
    </header>

    <main class="px-5 pt-4 pb-32">
      <section class="space-y-3 reveal" id="cart-items" aria-label="Itens do carrinho">
        <article class="cart-item bg-white rounded-2xl p-3.5 shadow-soft flex gap-3 items-center border border-paper-line" data-price="25">
          <div class="w-20 h-20 rounded-xl overflow-hidden shrink-0">
            <img
              class="w-full h-full object-cover"
              src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=300&q=80"
              alt="Classic Burger"
            />
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex justify-between items-start gap-2">
              <h3 class="font-display text-base font-bold">Classic Burger</h3>
              <p class="item-price font-display text-sm font-bold text-brand shrink-0">R$ 25,00</p>
            </div>
            <p class="text-xs text-ink-muted mt-0.5 mb-2.5">Blend premium, cheddar, folhas frescas</p>
            <div class="flex items-center justify-between">
              <div class="flex items-center bg-[#eef1f5] rounded-xl px-1 py-0.5">
                <button type="button" class="qty-minus w-8 h-8 grid place-items-center text-brand rounded-lg hover:bg-white active:scale-90 transition" aria-label="Diminuir">
                  <span class="material-symbols-outlined !text-[18px]" aria-hidden="true">remove</span>
                </button>
                <span class="qty-value mx-2 text-xs font-bold w-4 text-center">1</span>
                <button type="button" class="qty-plus w-8 h-8 grid place-items-center text-brand rounded-lg hover:bg-white active:scale-90 transition" aria-label="Aumentar">
                  <span class="material-symbols-outlined !text-[18px]" aria-hidden="true">add</span>
                </button>
              </div>
              <button type="button" class="remove-item w-9 h-9 grid place-items-center text-ink-faint hover:text-[#b91c1c] transition" aria-label="Remover item">
                <span class="material-symbols-outlined" aria-hidden="true">delete</span>
              </button>
            </div>
          </div>
        </article>
      </section>

      <section class="mt-6">
        <h4 class="text-[11px] font-bold text-ink-faint uppercase tracking-wider mb-2">Observações</h4>
        <textarea
          class="w-full bg-white border border-paper-line rounded-2xl p-3.5 text-sm min-h-[96px] transition"
          placeholder="Ex.: deixar na portaria, sem cebola..."
        ></textarea>
      </section>

      <section class="mt-4">
        <button type="button" id="coupon-toggle" class="w-full flex items-center justify-between py-3.5 px-4 bg-white rounded-2xl border border-paper-line hover:bg-brand-soft/40 transition" aria-expanded="false">
          <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-brand" aria-hidden="true">local_offer</span>
            <span class="text-sm font-bold">Adicionar cupom</span>
          </div>
          <span id="coupon-chevron" class="material-symbols-outlined text-ink-faint transition-transform" aria-hidden="true">expand_more</span>
        </button>
        <div id="coupon-panel" class="coupon-panel">
          <div class="flex gap-2">
            <input class="flex-1 border border-paper-line rounded-xl px-3.5 py-2.5 text-sm bg-white" placeholder="Digite o código" type="text" />
            <button type="button" id="apply-coupon" class="px-4 py-2.5 bg-brand-soft text-brand font-bold text-xs rounded-xl hover:bg-brand hover:text-white transition">
              Aplicar
            </button>
          </div>
        </div>
      </section>

      <section class="mt-6 bg-white rounded-2xl p-5 space-y-3 shadow-soft border border-paper-line">
        <div class="flex justify-between items-center text-sm text-ink-muted">
          <span>Subtotal</span>
          <span id="subtotal">R$ 25,00</span>
        </div>
        <div class="flex justify-between items-center text-sm text-ink-muted">
          <span>Taxa de entrega</span>
          <span id="delivery">R$ 5,00</span>
        </div>
        <div id="discount-row" class="hidden flex justify-between items-center text-sm text-brand font-semibold">
          <span>Desconto</span>
          <span id="discount">− R$ 0,00</span>
        </div>
        <div class="h-px bg-paper-line"></div>
        <div class="flex justify-between items-center">
          <span class="font-display text-base font-bold">Total</span>
          <span id="total" class="font-display text-xl font-extrabold text-brand">R$ 30,00</span>
        </div>
      </section>
    </main>

    <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[420px] z-50 px-5 py-4 bg-white/90 backdrop-blur-xl border-t border-paper-line">
      <a href="checkout.html" class="w-full brand-wash text-white py-3.5 rounded-2xl font-display font-bold shadow-lift active:scale-[0.98] transition flex items-center justify-center gap-2">
        Continuar para o checkout
        <span class="material-symbols-outlined" aria-hidden="true">arrow_forward</span>
      </a>
    </div>
  </div>

  <script>
    const UNIT = 25;
    const DELIVERY = 5;
    let qty = 1;
    let discount = 0;

    const qtyEl = document.querySelector(".qty-value");
    const itemPriceEl = document.querySelector(".item-price");
    const subtotalEl = document.getElementById("subtotal");
    const totalEl = document.getElementById("total");
    const discountRow = document.getElementById("discount-row");
    const discountEl = document.getElementById("discount");

    function formatBRL(value) {
      return value.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
    }

    function updateTotals() {
      const subtotal = UNIT * qty;
      const total = Math.max(0, subtotal + DELIVERY - discount);
      qtyEl.textContent = String(qty);
      itemPriceEl.textContent = formatBRL(subtotal);
      subtotalEl.textContent = formatBRL(subtotal);
      totalEl.textContent = formatBRL(total);
      if (discount > 0) {
        discountRow.classList.remove("hidden");
        discountRow.classList.add("flex");
        discountEl.textContent = `− ${formatBRL(discount)}`;
      }
    }

    document.querySelector(".qty-plus")?.addEventListener("click", () => {
      qty += 1;
      updateTotals();
    });

    document.querySelector(".qty-minus")?.addEventListener("click", () => {
      if (qty > 1) {
        qty -= 1;
        updateTotals();
      }
    });

    document.querySelector(".remove-item")?.addEventListener("click", () => {
      document.querySelector(".cart-item")?.remove();
      qty = 0;
      discount = 0;
      subtotalEl.textContent = formatBRL(0);
      totalEl.textContent = formatBRL(DELIVERY);
      discountRow.classList.add("hidden");
    });

    const couponToggle = document.getElementById("coupon-toggle");
    const couponPanel = document.getElementById("coupon-panel");
    const couponChevron = document.getElementById("coupon-chevron");

    couponToggle?.addEventListener("click", () => {
      const open = couponPanel.classList.toggle("is-open");
      couponToggle.setAttribute("aria-expanded", String(open));
      couponChevron.style.transform = open ? "rotate(180deg)" : "";
    });

    document.getElementById("apply-coupon")?.addEventListener("click", () => {
      const input = couponPanel.querySelector("input");
      const code = (input?.value || "").trim().toUpperCase();
      if (code === "GOURMET10") {
        discount = 5;
        updateTotals();
        input.value = "";
        couponToggle.querySelector("span:nth-child(2)").textContent = "Cupom GOURMET10 aplicado";
      } else if (code) {
        alert("Cupom inválido. Tente GOURMET10");
      }
    });
  </script>
</body>
</html>
